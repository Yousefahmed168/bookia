name: bookia
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.2
  dartz: ^0.10.1
  dio: ^5.9.2
  easy_localization: ^3.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  get_it: ^9.2.1
  go_router: ^17.1.0
  image_picker: ^1.2.1
  lottie: ^3.3.2
  pinput: ^6.0.2
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translation/

  fonts:
    - family: DMSerif
      fonts:
        - asset: assets\fonts\DMSerifDisplay-Regular.ttf
