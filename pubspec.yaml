name: bookia
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  gap: ^3.0.1
  lottie: ^3.3.2
  pinput: ^6.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_svg: ^2.2.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: DMSerif
      fonts:
        - asset: assets\fonts\DMSerifDisplay-Regular.ttf
